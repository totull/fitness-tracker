<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fitness Tracker</title>
  <style>
    :root {
      --bg: #eef4ff;
      --surface: #ffffff;
      --surface-soft: #f8fafc;
      --border: #d8e1ee;
      --text: #172033;
      --muted: #63718c;
      --primary: #2563eb;
      --primary-soft: #dbeafe;
      --success: #15803d;
      --success-soft: #dcfce7;
      --warn: #b45309;
      --warn-soft: #ffedd5;
      --danger: #b91c1c;
      --danger-soft: #fee2e2;
      --shadow: 0 20px 40px rgba(15, 23, 42, 0.08);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #eaf2ff 0%, #f8fafc 100%);
      color: var(--text);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    .app-shell {
      width: min(1100px, calc(100% - 24px));
      margin: 0 auto;
      padding: 16px 0 32px;
    }

    .app-header,
    .view,
    .card,
    .metric,
    .summary-row,
    .entry-row,
    .exercise-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
    }

    .app-header {
      padding: 18px;
      margin-bottom: 16px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    h1,
    h2,
    h3,
    h4,
    p {
      margin: 0;
    }

    .header-top {
      display: grid;
      gap: 14px;
      margin-top: 14px;
    }

    .title-block h1 {
      font-size: 28px;
      line-height: 1.1;
      margin-bottom: 6px;
    }

    .title-block p,
    .muted {
      color: var(--muted);
      line-height: 1.5;
    }

    .header-controls {
      display: grid;
      gap: 12px;
    }

    .field-group {
      display: grid;
      gap: 6px;
    }

    .field-group label {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .input,
    .input-inline,
    .textarea,
    .select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--surface-soft);
      padding: 12px 14px;
      color: var(--text);
    }

    .textarea {
      resize: vertical;
      min-height: 88px;
    }

    .header-stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .metric {
      padding: 14px;
      border-radius: var(--radius-lg);
      background: var(--surface-soft);
      box-shadow: none;
    }

    .metric strong {
      display: block;
      margin-top: 6px;
      font-size: 22px;
    }

    .tab-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 16px;
      position: sticky;
      top: 8px;
      z-index: 10;
    }

    .tab-button,
    .chip,
    .mini-button,
    .action-button,
    .ghost-button,
    .toggle {
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--surface);
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .tab-button {
      padding: 12px 10px;
      font-size: 13px;
      box-shadow: var(--shadow);
    }

    .tab-button.active,
    .chip.active,
    .toggle.active {
      background: var(--primary-soft);
      color: var(--primary);
      border-color: #93c5fd;
    }

    .view {
      padding: 18px;
      display: none;
      margin-bottom: 16px;
    }

    .view.active {
      display: block;
    }

    .grid {
      display: grid;
      gap: 14px;
    }

    .card {
      padding: 16px;
      border-radius: var(--radius-lg);
      box-shadow: none;
    }

    .card-header,
    .summary-row,
    .entry-row,
    .exercise-header,
    .set-row,
    .feedback-item,
    .history-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .card-header {
      margin-bottom: 12px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .tag.primary {
      background: var(--primary-soft);
      color: var(--primary);
    }

    .tag.success {
      background: var(--success-soft);
      color: var(--success);
    }

    .tag.warn {
      background: var(--warn-soft);
      color: var(--warn);
    }

    .tag.danger {
      background: var(--danger-soft);
      color: var(--danger);
    }

    .chip-row,
    .toggle-row,
    .inline-actions,
    .meal-list,
    .feedback-list,
    .exercise-list,
    .set-list,
    .history-list,
    .summary-list {
      display: grid;
      gap: 10px;
    }

    .chip-wrap,
    .toggle-wrap,
    .inline-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip,
    .toggle,
    .mini-button,
    .ghost-button {
      padding: 10px 12px;
      background: var(--surface-soft);
    }

    .mini-button,
    .ghost-button {
      font-size: 12px;
    }

    .ghost-button {
      background: transparent;
    }

    .action-button {
      padding: 14px 16px;
      background: var(--primary);
      color: #ffffff;
      border-color: var(--primary);
      width: 100%;
    }

    .meal-row,
    .summary-row,
    .entry-row,
    .history-row {
      padding: 12px 14px;
      border-radius: 16px;
      background: var(--surface-soft);
      border: 1px solid var(--border);
    }

    .summary-row,
    .history-row {
      align-items: flex-start;
    }

    .split-grid {
      display: grid;
      gap: 14px;
    }

    .exercise-card {
      padding: 14px;
      border-radius: 18px;
      background: var(--surface-soft);
      box-shadow: none;
    }

    .exercise-header {
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .exercise-title {
      display: grid;
      gap: 8px;
      flex: 1;
    }

    .set-row {
      align-items: end;
      padding: 10px 0;
      border-top: 1px solid var(--border);
    }

    .set-row:first-child {
      border-top: none;
      padding-top: 0;
    }

    .set-grid {
      display: grid;
      gap: 8px;
      width: 100%;
      grid-template-columns: 0.7fr 1fr 1fr;
    }

    .two-col,
    .three-col,
    .four-col,
    .metric-grid {
      display: grid;
      gap: 10px;
    }

    .two-col {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .three-col {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .four-col {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .metric-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .chart {
      display: flex;
      align-items: end;
      gap: 8px;
      min-height: 180px;
      padding-top: 16px;
    }

    .bar-group {
      flex: 1;
      display: grid;
      justify-items: center;
      gap: 8px;
    }

    .bar {
      width: 100%;
      max-width: 26px;
      border-radius: 999px 999px 8px 8px;
      background: linear-gradient(180deg, #60a5fa, #1d4ed8);
      min-height: 8px;
    }

    .bar.good {
      background: linear-gradient(180deg, #86efac, #15803d);
    }

    .bar.warn {
      background: linear-gradient(180deg, #fdba74, #c2410c);
    }

    .bar-label {
      font-size: 11px;
      color: var(--muted);
    }

    .feedback-item {
      align-items: flex-start;
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--surface-soft);
    }

    .save-note {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      margin-top: 10px;
    }

    .empty-state {
      padding: 14px;
      border-radius: 16px;
      background: var(--surface-soft);
      border: 1px dashed var(--border);
      color: var(--muted);
      text-align: center;
    }

    @media (min-width: 860px) {
      .header-top {
        grid-template-columns: 1.4fr 0.9fr;
        align-items: start;
      }

      .split-grid {
        grid-template-columns: 1.05fr 0.95fr;
      }

      .progress-grid {
        display: grid;
        grid-template-columns: 1.2fr 0.8fr;
        gap: 14px;
      }
    }

    @media (max-width: 680px) {
      .app-shell {
        width: min(100% - 16px, 1100px);
      }

      .title-block h1 {
        font-size: 24px;
      }

      .tab-bar {
        grid-template-columns: repeat(2, 1fr);
      }

      .two-col,
      .three-col,
      .four-col,
      .metric-grid,
      .set-grid {
        grid-template-columns: 1fr;
      }

      .set-row {
        align-items: stretch;
        flex-direction: column;
      }
    }
  </style>
</head>

  <div class="app-shell">
    <header class="app-header">
      <span class="eyebrow">Local-first app</span>
      <div class="header-top">
        <div class="title-block">
          <h1>Fitness Tracker</h1>
          <p>
            A working phone-friendly tracker for daily meals, workouts, cardio, progress,
            and weekly adherence. All entries are stored in your browser.
          </p>
        </div>
        <div class="header-controls">
          <div class="field-group">
            <label for="entryDate">Entry date</label>
            <input class="input" id="entryDate" type="date">
          </div>
          <div class="inline-actions">
            <button class="mini-button" type="button" data-action="prev-day">Previous day</button>
            <button class="mini-button" type="button" data-action="today">Today</button>
            <button class="mini-button" type="button" data-action="next-day">Next day</button>
          </div>
          <div class="header-stats" id="headerStats"></div>
        </div>
      </div>
      <div class="save-note" id="saveNote">Loading tracker...</div>
    </header>

    <nav class="tab-bar" id="tabBar">
      <button class="tab-button" data-view="dashboard">Dashboard</button>
      <button class="tab-button" data-view="log">Daily Log</button>
      <button class="tab-button" data-view="progress">Progress</button>
      <button class="tab-button" data-view="summary">Summary</button>
    </nav>

    <main>

      <section class="view" id="logView"></section>
      <section class="view" id="progressView"></section>
      <section class="view" id="summaryView"></section>
    </main>
  </div>

      startDate: TRACKER_START_DATE,
      selectedDate: TRACKER_START_DATE,
      currentView: "dashboard",
      lastSavedAt: null,
      profile: {
        currentWeight: 88,
        goalWeight: 75,
        calorieTarget: 1750,
        proteinTarget: 130,
        stepTarget: 10000,
        waterTargetLiters: 3,
        maintenanceCalories: 2450
      },
      remote: {
        url: "",
        anonKey: "",
        email: ""
      },
      entries: {}
    };

    let state = loadState();
    const remoteRuntime = {
      client: null,
      configKey: "",
      user: null,
      status: "Local only",
      tone: "primary",
      lastSyncAt: null,
      syncTimer: null,
      unsubscribe: null,
      pulling: false
    };

    function cloneData(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function todayKey() {
      const now = new Date();
      const local = new Date(now.getTime() - now.getTimezoneOffset() * 60000);
      return local.toISOString().slice(0, 10);
    }

    function maxDateKey(first, second) {
      return first >= second ? first : second;
    }

    function parseDateKey(dateKey) {
      return new Date(dateKey + "T00:00:00");
    }

    function daysBetween(fromKey, toKey) {
      return Math.round((parseDateKey(toKey) - parseDateKey(fromKey)) / DAY_MS);
    }

    function dayNumber(dateKey) {
      return Math.max(1, daysBetween(state.startDate, dateKey) + 1);
    }

    function formatHumanDate(dateKey) {
      return parseDateKey(dateKey).toLocaleDateString(undefined, {
        weekday: "short",
        month: "short",
        day: "numeric"
      });
    }

    function formatShortDate(dateKey) {
      return parseDateKey(dateKey).toLocaleDateString(undefined, {
        month: "short",
        day: "numeric"
      });
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function toNumber(value) {
      const num = Number(value);
      return Number.isFinite(num) ? num : 0;
    }

    function round(value) {
      return Math.round(value);
    }

    function roundOne(value) {
      return Math.round(value * 10) / 10;
    }

    function normalizeText(value) {
      return String(value || "")
        .toLowerCase()
        .replace(/[()]/g, " ")
        .replace(/[^a-z0-9.\s]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function escapeRegExp(value) {
      return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function titleCase(value) {
      return value.charAt(0).toUpperCase() + value.slice(1);
    }

    function formatWeightDelta(value) {
      if (!value) {
        return "0 kg";
      }
      return value > 0 ? `-${value} kg` : `+${Math.abs(value)} kg`;
    }

    function describeEnergyBalance(value) {
      if (value > 0) {
        return {
          label: "Deficit",
          shortLabel: "Deficit",
          avgLabel: "Avg deficit",
          valueText: `${Math.abs(value)} kcal`
        };
      }
      if (value < 0) {
        return {
          label: "Surplus",
          shortLabel: "Surplus",
          avgLabel: "Avg surplus",
          valueText: `${Math.abs(value)} kcal`
        };
      }
      return {
        label: "Balanced",
        shortLabel: "Balanced",
        avgLabel: "Avg energy balance",
        valueText: "0 kcal"
      };
    }

    function toneLabel(tone) {
      if (tone === "success") {
        return "Good";
      }
      if (tone === "warn") {
        return "Watch";
      }
      if (tone === "danger") {
        return "Alert";
      }
      return "Info";
    }

    function escapeValue(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function escapeText(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function formatMacroLine(nutrition) {
      return `${nutrition.protein}P / ${nutrition.carbs}C / ${nutrition.fat}F`;
    }

    function serializeMacroOverride(parts) {
      const tokens = [];
      if (parts?.protein !== null && parts?.protein !== undefined && parts.protein !== "") {
        tokens.push(`${roundOne(toNumber(parts.protein))}P`);
      }
      if (parts?.carbs !== null && parts?.carbs !== undefined && parts.carbs !== "") {
        tokens.push(`${roundOne(toNumber(parts.carbs))}C`);
      }
      if (parts?.fat !== null && parts?.fat !== undefined && parts.fat !== "") {
        tokens.push(`${roundOne(toNumber(parts.fat))}F`);
      }
      return tokens.join(" / ");
    }

    function parseMacroOverride(value) {
      const text = String(value || "").trim();
      if (!text) {
        return {
          protein: null,
          carbs: null,
          fat: null,
          hasAny: false,
          isValid: true
        };
      }

      const named = {};
      const namedPattern = /(\d+(?:\.\d+)?)\s*([pcf])\b/gi;
      let match = namedPattern.exec(text);
      while (match) {
        const amount = roundOne(toNumber(match[1]));
        const label = match[2].toLowerCase();
        if (label === "p") {
          named.protein = amount;
        } else if (label === "c") {
          named.carbs = amount;
        } else if (label === "f") {
          named.fat = amount;
        }
        match = namedPattern.exec(text);
      }

      if (Object.keys(named).length) {
        return {
          protein: named.protein ?? null,
          carbs: named.carbs ?? null,
          fat: named.fat ?? null,
          hasAny: true,
          isValid: true
        };
      }

      const numbers = text.match(/\d+(?:\.\d+)?/g)?.map((part) => roundOne(toNumber(part))) || [];
      if (numbers.length === 3) {
        return {
          protein: numbers[0],
          carbs: numbers[1],
          fat: numbers[2],
          hasAny: true,
          isValid: true
        };
      }

      return {
        protein: null,
        carbs: null,
        fat: null,
        hasAny: false,
        isValid: false
      };
    }

    function pruneEntriesBeforeBaseline(entries) {
      const nextEntries = {};
      Object.entries(entries || {}).forEach(([dateKey, entry]) => {
        if (dateKey >= TRACKER_START_DATE) {
          nextEntries[dateKey] = entry;
        }
      });
      return nextEntries;
    }

    function applyBaselineRules(baseState) {
      const nextState = {
        ...baseState,
        startDate: TRACKER_START_DATE,
        selectedDate: maxDateKey(baseState.selectedDate || TRACKER_START_DATE, TRACKER_START_DATE),
        entries: pruneEntriesBeforeBaseline(baseState.entries)
      };
      return nextState;
    }

    function loadState() {
      try {
        const saved = JSON.parse(
          localStorage.getItem(STORAGE_KEY) ||
          localStorage.getItem("fitness-tracker-local-v3") ||
          localStorage.getItem("fitness-tracker-local-v2") ||
          localStorage.getItem("fitness-tracker-local-v1") ||
          "null"
        );
        if (!saved) {
          const normalizedDefaultState = applyBaselineRules(cloneData(DEFAULT_STATE));
          localStorage.setItem(STORAGE_KEY, JSON.stringify(normalizedDefaultState));
          return normalizedDefaultState;
        }
        const normalizedState = applyBaselineRules({
          ...cloneData(DEFAULT_STATE),
          ...saved,
          profile: {
            ...cloneData(DEFAULT_STATE.profile),
            ...(saved.profile || {})
          },
          remote: {
            ...cloneData(DEFAULT_STATE.remote),
            ...(saved.remote || {})
          },
          entries: saved.entries || {}
        });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(normalizedState));
        return normalizedState;
      } catch (error) {
        const normalizedDefaultState = applyBaselineRules(cloneData(DEFAULT_STATE));
        localStorage.setItem(STORAGE_KEY, JSON.stringify(normalizedDefaultState));
        return normalizedDefaultState;
      }
    }

    function persistLocalState() {
      state.lastSavedAt = new Date().toISOString();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function saveState(options = {}) {
      persistLocalState();
      renderSaveNote();
      if (options.queueRemote !== false) {
        queueRemoteSync();
      }
    }

    function hasRemoteConfig() {
      return Boolean(state.remote.url.trim() && state.remote.anonKey.trim());
    }

    function remoteStatusLabel() {
      if (remoteRuntime.user) {
        return remoteRuntime.user.email || "Signed in";
      }
      return remoteRuntime.status;
    }

    function setRemoteStatus(status, tone = "primary") {
      remoteRuntime.status = status;
      remoteRuntime.tone = tone;
      renderSaveNote();
    }

    function resetRemoteClient() {
      if (remoteRuntime.unsubscribe?.unsubscribe) {
        remoteRuntime.unsubscribe.unsubscribe();
      }
      remoteRuntime.client = null;
      remoteRuntime.configKey = "";
      remoteRuntime.user = null;
      remoteRuntime.unsubscribe = null;
      remoteRuntime.lastSyncAt = null;
      clearTimeout(remoteRuntime.syncTimer);
      remoteRuntime.syncTimer = null;
    }

    async function ensureSupabaseClient() {
      if (!hasRemoteConfig()) {
        setRemoteStatus("Local only", "primary");
        return null;
      }

      if (!window.supabase?.createClient) {
        throw new Error("Supabase client library failed to load.");
      }

      const configKey = `${state.remote.url}|${state.remote.anonKey}`;
      if (remoteRuntime.client && remoteRuntime.configKey === configKey) {
        return remoteRuntime.client;
      }

      resetRemoteClient();
      remoteRuntime.client = window.supabase.createClient(state.remote.url, state.remote.anonKey, {
        auth: {
          persistSession: true,
          autoRefreshToken: true,
          detectSessionInUrl: true
        }
      });
      remoteRuntime.configKey = configKey;

      const authListener = remoteRuntime.client.auth.onAuthStateChange((_event, session) => {
        remoteRuntime.user = session?.user || null;
        if (remoteRuntime.user) {
          setRemoteStatus(`Signed in as ${remoteRuntime.user.email || state.remote.email}`, "success");
          render();
        } else if (hasRemoteConfig()) {
          setRemoteStatus("Configured. Send a magic link to sign in.", "warn");
          render();
        }
      });
      remoteRuntime.unsubscribe = authListener.data?.subscription || null;

      return remoteRuntime.client;
    }

    function buildRemotePayload() {
      return {
        version: state.version,
        startDate: state.startDate,
        profile: state.profile,
        entries: state.entries
      };
    }

    function applyRemotePayload(payload) {
      state.startDate = TRACKER_START_DATE;
      state.profile = {
        ...state.profile,
        ...(payload.profile || {})
      };
      state.entries = pruneEntriesBeforeBaseline(payload.entries || {});
      state.selectedDate = maxDateKey(state.selectedDate, TRACKER_START_DATE);
      ensureEntry(state.selectedDate);
    }

    async function restoreRemoteSession(options = {}) {
      if (!hasRemoteConfig()) {
        setRemoteStatus("Enter Supabase URL and anon key to enable cloud sync.", "warn");
        if (!options.silent) {
          render();
        }
        return;
      }

      try {
        const client = await ensureSupabaseClient();
        const { data, error } = await client.auth.getSession();
        if (error) {
          throw error;
        }

        remoteRuntime.user = data.session?.user || null;
        if (remoteRuntime.user) {
          setRemoteStatus(`Signed in as ${remoteRuntime.user.email || state.remote.email}`, "success");
          await pullRemoteState({ silent: true });
        } else {
          setRemoteStatus("Send a magic link to sign in from this device.", "warn");
        }
      } catch (error) {
        setRemoteStatus(error.message || "Unable to restore cloud session.", "danger");
      }

      if (!options.silent) {
        render();
      }
    }

    async function sendMagicLink() {
      if (!state.remote.email.trim()) {
        setRemoteStatus("Enter your email address first.", "warn");
        render();
        return;
      }

      try {
        const client = await ensureSupabaseClient();
        const { error } = await client.auth.signInWithOtp({
          email: state.remote.email.trim(),
          options: {
            emailRedirectTo: REMOTE_REDIRECT
          }
        });
        if (error) {
          throw error;
        }
        setRemoteStatus("Magic link sent. Open it on any device to sign in.", "success");
      } catch (error) {
        setRemoteStatus(error.message || "Unable to send magic link.", "danger");
      }

      render();
    }

    async function signOutRemote() {
      try {
        const client = await ensureSupabaseClient();
        if (client) {
          const { error } = await client.auth.signOut();
          if (error) {
            throw error;
          }
        }
        remoteRuntime.user = null;
        setRemoteStatus("Signed out. Local data remains on this device.", "warn");
      } catch (error) {
        setRemoteStatus(error.message || "Unable to sign out.", "danger");
      }

      render();
    }

    async function pushRemoteState(options = {}) {
      if (!hasRemoteConfig()) {
        if (!options.silent) {
          setRemoteStatus("Cloud sync is not configured yet.", "warn");
          render();
        }
        return;
      }

      try {
        const client = await ensureSupabaseClient();
        if (!remoteRuntime.user) {
          setRemoteStatus("Sign in first to push data to Supabase.", "warn");
          if (!options.silent) {
            render();
          }
          return;
        }

        const { error } = await client
          .from(REMOTE_TABLE)
          .upsert({
            user_id: remoteRuntime.user.id,
            payload: buildRemotePayload(),
            updated_at: new Date().toISOString()
          }, {
            onConflict: "user_id"
          });

        if (error) {
          throw error;
        }

        remoteRuntime.lastSyncAt = new Date().toISOString();
        setRemoteStatus(`Cloud synced for ${remoteRuntime.user.email || "current user"}.`, "success");
      } catch (error) {
        setRemoteStatus(error.message || "Push to Supabase failed.", "danger");
      }

      if (!options.silent) {
        render();
      }
    }

    async function pullRemoteState(options = {}) {
      if (!hasRemoteConfig()) {
        if (!options.silent) {
          setRemoteStatus("Cloud sync is not configured yet.", "warn");
          render();
        }
        return;
      }

      try {
        const client = await ensureSupabaseClient();
        if (!remoteRuntime.user) {
          setRemoteStatus("Sign in first to pull data from Supabase.", "warn");
          if (!options.silent) {
            render();
          }
          return;
        }

        const { data, error } = await client
          .from(REMOTE_TABLE)
          .select("payload, updated_at")
          .eq("user_id", remoteRuntime.user.id)
          .maybeSingle();

        if (error) {
          throw error;
        }

        if (!data?.payload) {
          setRemoteStatus("No cloud data yet. Push local data to create your first backup.", "warn");
        } else {
          remoteRuntime.pulling = true;
          applyRemotePayload(data.payload);
          saveState({ queueRemote: false });
          remoteRuntime.pulling = false;
          remoteRuntime.lastSyncAt = data.updated_at || new Date().toISOString();
          setRemoteStatus("Pulled the latest cloud data.", "success");
        }
      } catch (error) {
        remoteRuntime.pulling = false;
        setRemoteStatus(error.message || "Pull from Supabase failed.", "danger");
      }

      if (!options.silent) {
        render();
      }
    }

    function queueRemoteSync() {
      if (remoteRuntime.pulling || !hasRemoteConfig() || !remoteRuntime.user) {
        return;
      }

      clearTimeout(remoteRuntime.syncTimer);
      remoteRuntime.syncTimer = setTimeout(() => {
        pushRemoteState({ silent: true }).catch((error) => {
          setRemoteStatus(error.message || "Background sync failed.", "danger");
          render();
        });
      }, 700);
    }

    function getPlanIndex(dateKey) {
      const diff = daysBetween(state.startDate, dateKey);
      return ((diff % 7) + 7) % 7;
    }

    function getPlan(dateKey) {
      return WEEKLY_PLAN[getPlanIndex(dateKey)];
    }

    function getMeals(dateKey) {
      return MEAL_ROTATION[getPlanIndex(dateKey)];
    }

    function createExerciseLog(planExercise) {
      return {
        name: planExercise.name,
        sets: Array.from({ length: planExercise.sets }, () => ({
          weight: "",
          reps: String(planExercise.reps)
        }))
      };
    }

    function createEmptyMealLog() {
      return {
        details: "",
        caloriesOverride: "",
        macroOverride: ""
      };
    }

    function createDefaultMeals() {
      return {
        breakfast: createEmptyMealLog(),
        lunch: createEmptyMealLog(),
        dinner: createEmptyMealLog(),
        unplanned: createEmptyMealLog()
      };
    }

    function getDefaultBodyPartsForPlan(planName) {
      const normalized = normalizeText(planName);
      if (normalized.includes("chest")) {
        return ["Chest", "Triceps"];
      }
      if (normalized.includes("back")) {
        return ["Back", "Biceps"];
      }
      if (normalized.includes("leg")) {
        return ["Legs"];
      }
      if (normalized.includes("shoulder")) {
        return ["Shoulders", "Core"];
      }
      if (normalized.includes("swimming")) {
        return ["Swimming", "Full Body"];
      }
      if (normalized.includes("recovery")) {
        return ["Recovery"];
      }
      if (normalized.includes("rest")) {
        return ["Rest"];
      }
      return ["Full Body"];
    }

    function normalizeBodyPartList(parts) {
      const unique = [];
      parts.forEach((part) => {
        if (!part || !BODY_PART_LIBRARY[part] || unique.includes(part)) {
          return;
        }
        if (part === "Rest") {
          unique.length = 0;
          unique.push("Rest");
          return;
        }
        if (unique.includes("Rest")) {
          unique.splice(unique.indexOf("Rest"), 1);
        }
        unique.push(part);
      });
      return unique.length ? unique : ["Full Body"];
    }

    function parseBodyParts(value) {
      const normalized = normalizeText(value);
      if (!normalized) {
        return [];
      }
      const matches = BODY_PART_OPTIONS.filter((part) => normalized.includes(normalizeText(part)));
      return normalizeBodyPartList(matches);
    }

    function bodyPartsLabel(parts) {
      return normalizeBodyPartList(parts).join(" + ");
    }

    function syncActualBodyPartLabel(entry) {
      entry.actualBodyParts = normalizeBodyPartList(entry.actualBodyParts || []);
      entry.actualBodyPart = bodyPartsLabel(entry.actualBodyParts);
    }

    function createDefaultEntry(dateKey) {
      const plan = getPlan(dateKey);
      const bodyParts = getDefaultBodyPartsForPlan(plan.name);
      return {
        date: dateKey,
        weight: "",
        meals: createDefaultMeals(),
        waterLiters: "",
        steps: "",
        workoutDone: false,
        actualBodyParts: bodyParts,
        actualBodyPart: bodyPartsLabel(bodyParts),
        cardioType: plan.name === "Swimming + Full Body" ? "Swimming" : "Cycling",
        cardioDuration: plan.name === "Rest Day" ? "20" : "30",
        cardioIntensity: "Moderate",
        cardioCalories: String(estimateCardioCalories(
          plan.name === "Swimming + Full Body" ? "Swimming" : "Cycling",
          plan.name === "Rest Day" ? 20 : 30,
          "Moderate"
        )),
        strengthCaloriesOverride: "",
        workoutNotes: "",
        exerciseLogs: plan.exercises.map(createExerciseLog)
      };
    }

    function migrateLegacyMeal(mealValue, plannedMeal) {
      if (typeof mealValue === "boolean") {
        return mealValue
          ? { details: plannedMeal.name, caloriesOverride: String(plannedMeal.calories) }
          : createEmptyMealLog();
      }
      return {
        ...createEmptyMealLog(),
        ...(mealValue || {})
      };
    }

    function migrateEntry(dateKey, entry) {
      let changed = false;
      const plan = getPlan(dateKey);
      const plannedMeals = getMeals(dateKey);

      if (!entry.meals || typeof entry.meals !== "object") {
        entry.meals = createDefaultMeals();
        changed = true;
      }

      ["breakfast", "lunch", "dinner", "unplanned"].forEach((mealKey) => {
        const mealValue = entry.meals[mealKey];
        if (!mealValue || typeof mealValue !== "object" || typeof mealValue === "boolean") {
          entry.meals[mealKey] = migrateLegacyMeal(
            mealValue,
            plannedMeals[mealKey] || { name: "", calories: 0 }
          );
          changed = true;
        } else {
          const merged = { ...createEmptyMealLog(), ...mealValue };
          if (JSON.stringify(merged) !== JSON.stringify(mealValue)) {
            entry.meals[mealKey] = merged;
            changed = true;
          }
        }
      });

      if (!Array.isArray(entry.exerciseLogs) || entry.exerciseLogs.length === 0) {
        entry.exerciseLogs = plan.exercises.map(createExerciseLog);
        changed = true;
      }

      entry.exerciseLogs = entry.exerciseLogs.map((exercise) => {
        const nextExercise = {
          name: exercise?.name || "New exercise",
          sets: Array.isArray(exercise?.sets) && exercise.sets.length
            ? exercise.sets.map((set) => ({
              weight: set?.weight ?? "",
              reps: set?.reps ?? ""
            }))
            : [{ weight: "", reps: "" }]
        };
        return nextExercise;
      });

      if (!entry.actualBodyParts || !Array.isArray(entry.actualBodyParts) || !entry.actualBodyParts.length) {
        const parsed = parseBodyParts(entry.actualBodyPart);
        entry.actualBodyParts = parsed.length ? parsed : getDefaultBodyPartsForPlan(plan.name);
        changed = true;
      }

      if (entry.waterLiters === undefined) {
        entry.waterLiters = "";
        changed = true;
      }

      if (entry.strengthCaloriesOverride === undefined) {
        entry.strengthCaloriesOverride = "";
        changed = true;
      }

      syncActualBodyPartLabel(entry);

      return changed;
    }

    function ensureEntry(dateKey) {
      let shouldSave = false;
      if (!state.entries[dateKey]) {
        state.entries[dateKey] = createDefaultEntry(dateKey);
        shouldSave = true;
      }

      const entry = state.entries[dateKey];
      if (migrateEntry(dateKey, entry)) {
        shouldSave = true;
      }

      if (shouldSave) {
        saveState();
      }

      return entry;
    }

    function estimateCardioCalories(type, duration, intensity) {
      const base = CARDIO_TYPES[type] || 7;
      const factor = INTENSITY_FACTORS[intensity] || 1;
      return round(base * toNumber(duration) * factor);
    }

    function syncCardioEstimate(entry) {
      entry.cardioCalories = String(
        estimateCardioCalories(entry.cardioType, entry.cardioDuration, entry.cardioIntensity)
      );
    }

    function estimateStepCalories(steps, weightKg) {
      const stepCount = toNumber(steps);
      const currentWeight = toNumber(weightKg) || state.profile.currentWeight;
      if (!stepCount || !currentWeight) {
        return 0;
      }
      const distanceKm = stepCount * 0.000762;
      return round(distanceKm * currentWeight * 0.53);
    }

    function hasAliasMatch(segment, alias) {
      const regex = new RegExp(`(^|\\s)${escapeRegExp(normalizeText(alias))}(?=\\s|$)`);
      return regex.test(segment);
    }

    function findFoodMatch(segment) {
      let bestMatch = null;
      FOOD_CATALOG.forEach((item) => {
        item.aliases.forEach((alias) => {
          if (hasAliasMatch(segment, alias)) {
            if (!bestMatch || alias.length > bestMatch.alias.length) {
              bestMatch = { item, alias };
            }
          }
        });
      });
      return bestMatch?.item || null;
    }

    function extractFoodAmount(segment, item) {
      const grams = segment.match(/(\d+(?:\.\d+)?)\s*(g|gram|grams)\b/);
      const ml = segment.match(/(\d+(?:\.\d+)?)\s*(ml)\b/);
      const cups = segment.match(/(\d+(?:\.\d+)?)\s*(cup|cups)\b/);
      const pieces = segment.match(/(\d+(?:\.\d+)?)\s*(piece|pieces|egg|eggs|roti|rotis|chapati|scoop|scoops|serving|servings)\b/);
      const rawNumber = segment.match(/(^|\s)(\d+(?:\.\d+)?)(?=\s|$)/);

      if (item.measure === "g" && grams) {
        return toNumber(grams[1]) / item.baseAmount;
      }
      if (item.measure === "ml" && ml) {
        return toNumber(ml[1]) / item.baseAmount;
      }
      if (item.measure === "cup" && cups) {
        return toNumber(cups[1]) / item.baseAmount;
      }
      if ((item.measure === "piece" || item.measure === "scoop" || item.measure === "serving") && pieces) {
        return toNumber(pieces[1]) / item.baseAmount;
      }
      if (rawNumber) {
        return toNumber(rawNumber[2]) / item.baseAmount;
      }
      return 1;
    }

    function estimateMealNutritionFromText(text) {
      const segments = String(text || "")
        .split(/[\n,;+]/)
        .map((part) => normalizeText(part))
        .filter(Boolean);
      const totals = {
        calories: 0,
        protein: 0,
        carbs: 0,
        fat: 0,
        recognizedCount: 0,
        recognizedNames: []
      };

      segments.forEach((segment) => {
        const item = findFoodMatch(segment);
        if (!item) {
          return;
        }
        const amount = extractFoodAmount(segment, item);
        totals.calories += item.calories * amount;
        totals.protein += item.protein * amount;
        totals.carbs += item.carbs * amount;
        totals.fat += item.fat * amount;
        totals.recognizedCount += 1;
        totals.recognizedNames.push(item.aliases[0]);
      });

      return {
        calories: round(totals.calories),
        protein: roundOne(totals.protein),
        carbs: roundOne(totals.carbs),
        fat: roundOne(totals.fat),
        recognizedCount: totals.recognizedCount,
        recognizedNames: totals.recognizedNames
      };
    }

    function calculateMealNutrition(mealLog) {
      const details = mealLog?.details?.trim() || "";
      const estimated = estimateMealNutritionFromText(details);
      const caloriesOverrideValue = mealLog?.caloriesOverride ?? "";
      const macroOverrideValue = mealLog?.macroOverride ?? serializeMacroOverride({
        protein: mealLog?.proteinOverride,
        carbs: mealLog?.carbsOverride,
        fat: mealLog?.fatOverride
      });
      const parsedMacroOverride = parseMacroOverride(macroOverrideValue);
      const overrideCalories = caloriesOverrideValue !== "" ? toNumber(caloriesOverrideValue) : null;
      const overrideProtein = parsedMacroOverride.protein;
      const overrideCarbs = parsedMacroOverride.carbs;
      const overrideFat = parsedMacroOverride.fat;
      const usedMacroOverride = parsedMacroOverride.hasAny;

      return {
        details,
        hasLog: Boolean(
          details ||
          caloriesOverrideValue !== "" ||
          macroOverrideValue !== ""
        ),
        calories: overrideCalories !== null ? overrideCalories : estimated.calories,
        protein: roundOne(overrideProtein !== null ? overrideProtein : estimated.protein),
        carbs: roundOne(overrideCarbs !== null ? overrideCarbs : estimated.carbs),
        fat: roundOne(overrideFat !== null ? overrideFat : estimated.fat),
        macroOverrideValue,
        usedCaloriesOverride: overrideCalories !== null,
        usedMacroOverride,
        usedOverride: overrideCalories !== null || usedMacroOverride,
        invalidMacroOverride: macroOverrideValue !== "" && !parsedMacroOverride.isValid,
        recognizedCount: estimated.recognizedCount,
        recognizedNames: estimated.recognizedNames
      };
    }

    function getActualBodyParts(entry, dateKey) {
      const bodyParts = normalizeBodyPartList(entry.actualBodyParts || parseBodyParts(entry.actualBodyPart));
      return bodyParts.length ? bodyParts : getDefaultBodyPartsForPlan(getPlan(dateKey).name);
    }

    function getActualBodyPart(entry, dateKey) {
      return bodyPartsLabel(getActualBodyParts(entry, dateKey));
    }

    function buildExercisesForBodyParts(bodyParts) {
      const merged = [];
      bodyParts.forEach((part) => {
        const template = BODY_PART_LIBRARY[part];
        if (!template) {
          return;
        }
        template.exercises.forEach((exercise) => {
          if (!merged.some((item) => normalizeText(item.name) === normalizeText(exercise.name))) {
            merged.push(createExerciseLog(exercise));
          }
        });
      });
      return merged.length ? merged : [{ name: "New exercise", sets: [{ weight: "", reps: "" }] }];
    }

    function getBodyPartFactor(bodyParts) {
      const normalizedParts = normalizeBodyPartList(bodyParts);
      const factors = normalizedParts.map((part) => BODY_PART_LIBRARY[part]?.factor || 1);
      const averageFactor = factors.reduce((sum, factor) => sum + factor, 0) / factors.length;
      const comboBonus = 1 + Math.min(0.18, (normalizedParts.length - 1) * 0.05);
      return roundOne(averageFactor * comboBonus);
    }

    function calculateWorkoutVolume(entry) {
      return round(
        entry.exerciseLogs.reduce((total, exercise) => {
          return total + exercise.sets.reduce((setTotal, set) => {
            return setTotal + (toNumber(set.weight) * toNumber(set.reps));
          }, 0);
        }, 0)
      );
    }

    function calculateTotalReps(entry) {
      return round(
        entry.exerciseLogs.reduce((total, exercise) => {
          return total + exercise.sets.reduce((setTotal, set) => setTotal + toNumber(set.reps), 0);
        }, 0)
      );
    }

    function countCompletedSets(entry) {
      return entry.exerciseLogs.reduce((total, exercise) => {
        return total + exercise.sets.filter((set) => toNumber(set.reps) > 0 || toNumber(set.weight) > 0).length;
      }, 0);
    }

    function countNamedExercises(entry) {
      return entry.exerciseLogs.filter((exercise) => exercise.name.trim()).length;
    }

    function getExerciseDurationMode(exerciseName) {
      const normalized = normalizeText(exerciseName);
      if (/(plank|hold|wall sit)/.test(normalized)) {
        return "seconds";
      }
      if (/(swimming|cycling|walk|walking|mobility|flow|laps)/.test(normalized)) {
        return "minutes";
      }
      return "reps";
    }

    function getExerciseEffortProfile(exerciseName) {
      const normalized = normalizeText(exerciseName);
      if (/(squat|deadlift|leg press|step up|lunge|row|pulldown|pull up|push up|press|goblet|bench)/.test(normalized)) {
        return { met: 4.3, restMinutes: 1.1 };
      }
      if (/(plank|crunch|dead bug|core|mobility|flow|band pull apart)/.test(normalized)) {
        return { met: 3.1, restMinutes: 0.4 };
      }
      if (/(swimming|cycling|walk|walking|recovery)/.test(normalized)) {
        return { met: 3.2, restMinutes: 0.25 };
      }
      return { met: 3.6, restMinutes: 0.75 };
    }

    function estimateExerciseSetMinutes(exerciseName, repsValue) {
      const mode = getExerciseDurationMode(exerciseName);
      if (mode === "minutes") {
        return clamp(repsValue, 1, 45);
      }
      if (mode === "seconds") {
        return clamp(repsValue / 60, 0.25, 3);
      }
      return clamp((Math.max(repsValue, 1) * 4.5) / 60, 0.35, 1.25);
    }

    function estimateExerciseSetMET(exerciseName, setWeight, repsValue, bodyWeightKg) {
      const profile = getExerciseEffortProfile(exerciseName);
      let met = profile.met;

      if (bodyWeightKg > 0 && setWeight > 0) {
        if (setWeight >= bodyWeightKg * 0.75) {
          met += 0.25;
        } else if (setWeight >= bodyWeightKg * 0.4) {
          met += 0.15;
        } else if (setWeight >= bodyWeightKg * 0.2) {
          met += 0.05;
        }
      }

      if (getExerciseDurationMode(exerciseName) === "reps" && repsValue >= 12) {
        met += 0.1;
      }

      return clamp(met, 3.0, 4.8);
    }

    function estimateWorkoutCalories(entry) {
      if (!entry.workoutDone) {
        return 0;
      }

      const bodyWeightKg = toNumber(entry.weight) || state.profile.currentWeight;
      if (!bodyWeightKg) {
        return 0;
      }

      let totalMinutes = 0;
      let metMinutes = 0;

      entry.exerciseLogs.forEach((exercise) => {
        const completedSets = exercise.sets.filter((set) => toNumber(set.reps) > 0 || toNumber(set.weight) > 0);
        if (!completedSets.length) {
          return;
        }

        const profile = getExerciseEffortProfile(exercise.name);
        completedSets.forEach((set, setIndex) => {
          const repsValue = toNumber(set.reps);
          const weightValue = toNumber(set.weight);
          const activeMinutes = estimateExerciseSetMinutes(exercise.name, repsValue);
          const activeMet = estimateExerciseSetMET(exercise.name, weightValue, repsValue, bodyWeightKg);
          totalMinutes += activeMinutes;
          metMinutes += activeMet * activeMinutes;

          if (setIndex < completedSets.length - 1) {
            totalMinutes += profile.restMinutes;
            metMinutes += 2 * profile.restMinutes;
          }
        });

        totalMinutes += 0.25;
        metMinutes += 2 * 0.25;
      });

      if (!totalMinutes) {
        return 0;
      }

      const averageMet = metMinutes / totalMinutes;
      return round(bodyWeightKg * averageMet * (totalMinutes / 60));
    }

    function calculateMetrics(dateKey) {
      const entry = ensureEntry(dateKey);
      const meals = getMeals(dateKey);
      const plan = getPlan(dateKey);
      const mealBreakdown = {};
      const actualBodyParts = getActualBodyParts(entry, dateKey);
      const actualBodyPart = getActualBodyPart(entry, dateKey);

      let foodCalories = 0;
      let protein = 0;
      let carbs = 0;
      let fat = 0;

      ["breakfast", "lunch", "dinner", "unplanned"].forEach((mealKey) => {
        mealBreakdown[mealKey] = calculateMealNutrition(entry.meals[mealKey]);
        foodCalories += mealBreakdown[mealKey].calories;
        protein += mealBreakdown[mealKey].protein;
        carbs += mealBreakdown[mealKey].carbs;
        fat += mealBreakdown[mealKey].fat;
      });

      const workoutVolume = calculateWorkoutVolume(entry);
      const totalReps = calculateTotalReps(entry);
      const completedSets = countCompletedSets(entry);
      const estimatedWorkoutCalories = estimateWorkoutCalories(entry);
      const strengthCaloriesOverride = entry.strengthCaloriesOverride !== "" ? toNumber(entry.strengthCaloriesOverride) : null;
      const workoutCalories = strengthCaloriesOverride !== null ? strengthCaloriesOverride : estimatedWorkoutCalories;
      const cardioCalories = toNumber(entry.cardioCalories);
      const stepCalories = estimateStepCalories(entry.steps, entry.weight || state.profile.currentWeight);
      const caloriesBurnt = workoutCalories + cardioCalories + stepCalories;
      const deficit = round(state.profile.maintenanceCalories + caloriesBurnt - foodCalories);
      const waterLiters = roundOne(toNumber(entry.waterLiters));

      const calorieScore = foodCalories === 0
        ? 0
        : clamp(100 - Math.max(0, foodCalories - state.profile.calorieTarget) / state.profile.calorieTarget * 180, 0, 100);
      const proteinScore = clamp((protein / state.profile.proteinTarget) * 100, 0, 100);
      const stepsScore = clamp((toNumber(entry.steps) / state.profile.stepTarget) * 100, 0, 100);
      const waterScore = clamp((waterLiters / state.profile.waterTargetLiters) * 100, 0, 100);
      const workoutScore = entry.workoutDone ? 100 : 0;
      const adherenceScore = round((calorieScore + proteinScore + stepsScore + waterScore + workoutScore) / 5);
      const activityScore = round(
        clamp((toNumber(entry.steps) / state.profile.stepTarget) * 50, 0, 50) +
        (entry.workoutDone ? 25 : 0) +
        clamp((toNumber(entry.cardioDuration) / 30) * 25, 0, 25)
      );

      return {
        plan,
        meals,
        mealBreakdown,
        actualBodyParts,
        actualBodyPart,
        foodCalories: round(foodCalories),
        protein: roundOne(protein),
        carbs: roundOne(carbs),
        fat: roundOne(fat),
        waterLiters,
        estimatedWorkoutCalories,
        strengthCaloriesOverride,
        usedStrengthOverride: strengthCaloriesOverride !== null,
        workoutCalories,
        cardioCalories,
        stepCalories,
        caloriesBurnt,
        deficit,
        workoutVolume,
        totalReps,
        completedSets,
        activityScore,
        adherenceScore
      };
    }

    function buildDailyFeedback(dateKey) {
      const entry = ensureEntry(dateKey);
      const metrics = calculateMetrics(dateKey);
      const feedback = [];
      const lowConfidenceMeals = Object.entries(metrics.mealBreakdown).filter(([, meal]) => meal.hasLog && meal.recognizedCount === 0 && !meal.usedOverride);

      if (metrics.foodCalories > state.profile.calorieTarget) {
        feedback.push({
          tone: "danger",
          title: "Calories are above target",
          body: "Trim dinner portions or add an extra walk to bring the day closer to plan."
        });
      } else if (metrics.foodCalories > 0) {
        feedback.push({
          tone: "success",
          title: "Calories are within target",
          body: "Your logged meals are staying close to the daily goal."
        });
      }

      if (metrics.protein < state.profile.proteinTarget) {
        feedback.push({
          tone: "warn",
          title: "Protein is low",
          body: "Add tofu, curd, Greek yogurt, whey, or egg whites to close the gap."
        });
      }

      if (lowConfidenceMeals.length) {
        feedback.push({
          tone: "warn",
          title: "Some meals need better detail",
          body: "Use comma-separated foods like 2 eggs, 200g curd, 1 roti, or add a calorie override."
        });
      }

      if (metrics.waterLiters > 0 && metrics.waterLiters < state.profile.waterTargetLiters) {
        feedback.push({
          tone: "warn",
          title: "Water intake is below target",
          body: `Aim for about ${state.profile.waterTargetLiters} L today to support training and recovery.`
        });
      }

      if (!entry.workoutDone && !metrics.actualBodyParts.every((part) => part === "Rest")) {
        feedback.push({
          tone: "danger",
          title: "Workout still pending",
          body: "If the main session is missed, log the actual body part as recovery and keep steps up."
        });
      }

      if (toNumber(entry.steps) < state.profile.stepTarget) {
        feedback.push({
          tone: "warn",
          title: "Steps are below target",
          body: "A 15 to 20 minute walk after dinner will usually close the gap."
        });
      }

      if (feedback.length === 0) {
        feedback.push({
          tone: "primary",
          title: "No alerts yet",
          body: "Start logging meals and training to unlock smarter feedback."
        });
      }

      return feedback;
    }

    function getOrderedEntryKeys() {
      return Object.keys(state.entries).filter((dateKey) => dateKey >= TRACKER_START_DATE).sort();
    }

    function getRecentEntryKeys(limit) {
      return getOrderedEntryKeys().slice(-limit);
    }

    function getLastNDates(endDateKey, count) {
      return Array.from({ length: count }, (_, index) => {
        const date = parseDateKey(endDateKey);
        date.setDate(date.getDate() - (count - index - 1));
        const local = new Date(date.getTime() - date.getTimezoneOffset() * 60000);
        return local.toISOString().slice(0, 10);
      }).filter((dateKey) => dateKey >= TRACKER_START_DATE);
    }

    function getWeeklySummary(endDateKey) {
      const dates = getLastNDates(endDateKey, 7);
      const populated = dates.map((dateKey) => {
        const entry = state.entries[dateKey];
        if (!entry) {
          return null;
        }
        return {
          dateKey,
          entry: ensureEntry(dateKey),
          metrics: calculateMetrics(dateKey)
        };
      }).filter(Boolean);

      const workoutsDone = populated.filter((item) => item.entry.workoutDone).length;
      const avgSteps = populated.length
        ? round(populated.reduce((sum, item) => sum + toNumber(item.entry.steps), 0) / populated.length)
        : 0;
      const avgProtein = populated.length
        ? roundOne(populated.reduce((sum, item) => sum + item.metrics.protein, 0) / populated.length)
        : 0;
      const avgDeficit = populated.length
        ? round(populated.reduce((sum, item) => sum + item.metrics.deficit, 0) / populated.length)
        : 0;
      const avgAdherence = populated.length
        ? round(populated.reduce((sum, item) => sum + item.metrics.adherenceScore, 0) / populated.length)
        : 0;
      const avgBurn = populated.length
        ? round(populated.reduce((sum, item) => sum + item.metrics.caloriesBurnt, 0) / populated.length)
        : 0;
      const avgWater = populated.length
        ? roundOne(populated.reduce((sum, item) => sum + item.metrics.waterLiters, 0) / populated.length)
        : 0;
      const weights = populated.map((item) => toNumber(item.entry.weight)).filter(Boolean);
      const weightChange = weights.length >= 2 ? roundOne(weights[0] - weights[weights.length - 1]) : 0;

      const suggestions = [];
      if (avgAdherence >= 80 && Math.abs(weightChange) < 0.3 && populated.length >= 5) {
        suggestions.push("Plateau signal: keep protein high and either trim 100 to 150 kcal or add 2k daily steps next week.");
      }
      if (avgProtein < state.profile.proteinTarget) {
        suggestions.push("Average protein is low. Add tofu, Greek yogurt, whey, or egg whites to one more meal.");
      }
      if (avgSteps < state.profile.stepTarget) {
        suggestions.push("Average steps are below target. A fixed post-dinner walk will improve consistency.");
      }
      if (avgWater > 0 && avgWater < state.profile.waterTargetLiters) {
        suggestions.push(`Average hydration is low. Push daily water closer to ${state.profile.waterTargetLiters} L.`);
      }
      if (workoutsDone < 5) {
        suggestions.push("Training frequency slipped this week. Protect the key strength days before adding more cardio.");
      }
      if (suggestions.length === 0) {
        suggestions.push("The week looks steady. Stay consistent before making any new calorie cuts.");
      }

      return {
        loggedDays: populated.length,
        workoutsDone,
        avgSteps,
        avgProtein,
        avgDeficit,
        avgAdherence,
        avgBurn,
        avgWater,
        weightChange,
        suggestions
      };
    }

    function buildHeaderStats(dateKey) {
      const metrics = calculateMetrics(dateKey);
      const currentWeight = ensureEntry(dateKey).weight || state.profile.currentWeight;
      const energyBalance = describeEnergyBalance(metrics.deficit);

      return [
        { label: "Day", value: dayNumber(dateKey) + " / 90" },
        { label: "Weight", value: currentWeight ? currentWeight + " kg" : "--" },
        { label: energyBalance.label, value: energyBalance.valueText },
        { label: "Adherence", value: metrics.adherenceScore + "%" }
      ];
    }

      document.getElementById("headerStats").innerHTML = buildHeaderStats(state.selectedDate).map((item) => `

        });
      const syncText = hasRemoteConfig()

    function renderTabs() {
      document.querySelectorAll(".tab-button").forEach((button) => {

      document.querySelectorAll(".view").forEach((view) => {

      });

    function mealEstimateHint(mealMetric) {
      if (!mealMetric.hasLog) {
        return "Not logged yet. Example: 2 eggs, 200g curd, 1 roti.";
      }
      if (mealMetric.invalidMacroOverride) {
        return "Macros format not recognized. Use 30P / 40C / 12F, or 30 / 40 / 12.";
      }
      const manualParts = [];
      if (mealMetric.usedCaloriesOverride) {
        manualParts.push("calories");
      }
      if (mealMetric.usedMacroOverride) {
        manualParts.push("macros");
      }
      if (manualParts.length) {
        const prefix = `${titleCase(manualParts.join(" and "))} manually set.`;
        if (mealMetric.recognizedCount === 0) {
          return prefix + " Add food details if you want the automatic estimate too.";
        }
        return prefix + " Recognized foods: " + mealMetric.recognizedNames.join(", ");
      }
      if (mealMetric.recognizedCount === 0) {
        return "No food match found yet. Add details like whey, eggs, curd, tofu, roti, rice.";
      }
      return "Recognized foods: " + mealMetric.recognizedNames.join(", ");
    }

    function updateExerciseSetCount(exercise, nextCount) {
      const count = clamp(toNumber(nextCount) || 1, 1, 12);
      while (exercise.sets.length < count) {
        const lastReps = exercise.sets[exercise.sets.length - 1]?.reps || "";
        exercise.sets.push({ weight: "", reps: lastReps });
      }
      while (exercise.sets.length > count) {
        exercise.sets.pop();
      }
    }

    function shiftSelectedDate(days) {
      const nextDate = parseDateKey(state.selectedDate);
      nextDate.setDate(nextDate.getDate() + days);
      const local = new Date(nextDate.getTime() - nextDate.getTimezoneOffset() * 60000);
      state.selectedDate = maxDateKey(local.toISOString().slice(0, 10), TRACKER_START_DATE);
      ensureEntry(state.selectedDate);
    }

    function toggleBodyPartSelection(entry, bodyPart) {
      const currentParts = new Set(getActualBodyParts(entry, state.selectedDate));

      if (bodyPart === "Rest") {
        entry.actualBodyParts = ["Rest"];
        syncActualBodyPartLabel(entry);
        return;
      }

      currentParts.delete("Rest");

      if (currentParts.has(bodyPart)) {
        if (currentParts.size === 1) {
          syncActualBodyPartLabel(entry);
          return;
        }
        currentParts.delete(bodyPart);
      } else {
        currentParts.add(bodyPart);
      }

      entry.actualBodyParts = normalizeBodyPartList(Array.from(currentParts));
      syncActualBodyPartLabel(entry);
    }

    function handleChange(event) {
      const target = event.target;
      const entry = ensureEntry(state.selectedDate);

      if (target.id === "entryDate") {
        state.selectedDate = maxDateKey(target.value || todayKey(), TRACKER_START_DATE);
        ensureEntry(state.selectedDate);
        saveState();
        render();
        return;
      }

      if (target.dataset.remoteField) {
        state.remote[target.dataset.remoteField] = target.value;
        if (target.dataset.remoteField === "url" || target.dataset.remoteField === "anonKey") {
          resetRemoteClient();
          setRemoteStatus(hasRemoteConfig() ? "Configured. Restore session or send a magic link." : "Local only", hasRemoteConfig() ? "warn" : "primary");
        }
        saveState({ queueRemote: false });
        render();
        return;
      }

      if (target.dataset.mealField) {
        const mealKey = target.dataset.mealKey;
        entry.meals[mealKey][target.dataset.mealField] = target.value;
        saveState();
        render();
        return;
      }

      if (target.dataset.field) {
        entry[target.dataset.field] = target.value;
        if (["cardioType", "cardioDuration", "cardioIntensity"].includes(target.dataset.field)) {
          syncCardioEstimate(entry);
        }
        saveState();
        render();
        return;
      }

      if (target.dataset.exerciseField) {
        const exercise = entry.exerciseLogs[toNumber(target.dataset.exerciseIndex)];
        if (!exercise) {
          return;
        }
        if (target.dataset.exerciseField === "setCount") {
          updateExerciseSetCount(exercise, target.value);
          entry.workoutDone = true;
        } else {
          exercise[target.dataset.exerciseField] = target.value;
        }
        saveState();
        render();
        return;
      }

      if (target.dataset.setField) {
        const exercise = entry.exerciseLogs[toNumber(target.dataset.exerciseIndex)];
        const set = exercise?.sets[toNumber(target.dataset.setIndex)];
        if (!set) {
          return;
        }
        set[target.dataset.setField] = target.value;
        entry.workoutDone = true;
        saveState();
        render();
      }
    }

    function handleClick(event) {
      const button = event.target.closest("button");
      if (!button) {
        return;
      }

      if (button.dataset.view) {
        state.currentView = button.dataset.view;
        saveState();
        render();
        return;
      }

      const entry = ensureEntry(state.selectedDate);

      if (button.dataset.action === "prev-day") {
        shiftSelectedDate(-1);
        saveState();
        render();
        return;
      }

      if (button.dataset.action === "today") {
        state.selectedDate = maxDateKey(todayKey(), TRACKER_START_DATE);
        ensureEntry(state.selectedDate);
        saveState();
        render();
        return;
      }

      if (button.dataset.action === "next-day") {
        shiftSelectedDate(1);
        saveState();
        render();
        return;
      }

      if (button.dataset.action === "remote-magic-link") {
        sendMagicLink();
        return;
      }

      if (button.dataset.action === "remote-restore-session") {
        restoreRemoteSession();
        return;
      }

      if (button.dataset.action === "remote-push") {
        pushRemoteState();
        return;
      }

      if (button.dataset.action === "remote-pull") {
        pullRemoteState();
        return;
      }

      if (button.dataset.action === "remote-signout") {
        signOutRemote();
        return;
      }

      if (button.dataset.stepPreset) {
        entry.steps = button.dataset.stepPreset;
        saveState();
        render();
        return;
      }

      if (button.dataset.waterPreset) {
        entry.waterLiters = button.dataset.waterPreset;
        saveState();
        render();
        return;
      }

      if (button.dataset.workout) {
        entry.workoutDone = button.dataset.workout === "true";
        saveState();
        render();
        return;
      }

      if (button.dataset.cardioMode) {
        entry.cardioType = button.dataset.cardioMode;
        syncCardioEstimate(entry);
        saveState();
        render();
        return;
      }

      if (button.dataset.bodypartPreset) {
        toggleBodyPartSelection(entry, button.dataset.bodypartPreset);
        saveState();
        render();
        return;
      }

      if (button.dataset.action === "use-planned-meal") {
        const mealKey = button.dataset.mealKey;
        entry.meals[mealKey].details = getMeals(state.selectedDate)[mealKey].name;
        saveState();
        render();
        return;
      }

      if (button.dataset.action === "clear-meal") {
        const mealKey = button.dataset.mealKey;
        entry.meals[mealKey] = createEmptyMealLog();
        saveState();
        render();
        return;
      }

      if (button.dataset.action === "recalculate-cardio") {
        syncCardioEstimate(entry);
        saveState();
        render();
        return;
      }

      if (button.dataset.action === "apply-bodypart-template") {
        entry.exerciseLogs = buildExercisesForBodyParts(getActualBodyParts(entry, state.selectedDate));
        saveState();
        render();
        return;
      }

      if (button.dataset.action === "add-exercise") {
        entry.exerciseLogs.push({
          name: "New exercise",
          sets: [
            { weight: "", reps: "" },
            { weight: "", reps: "" }
          ]
        });
        saveState();
        render();
        return;
      }

      if (button.dataset.action === "remove-exercise") {
        entry.exerciseLogs.splice(toNumber(button.dataset.exerciseIndex), 1);
        if (entry.exerciseLogs.length === 0) {
          entry.exerciseLogs.push({
            name: "New exercise",
            sets: [{ weight: "", reps: "" }]
          });
        }
        saveState();
        render();
        return;
      }

      if (button.dataset.action === "add-set") {
        const exercise = entry.exerciseLogs[toNumber(button.dataset.exerciseIndex)];
        if (exercise) {
          const lastReps = exercise.sets[exercise.sets.length - 1]?.reps || "";
          exercise.sets.push({ weight: "", reps: lastReps });
          saveState();
          render();
        }
        return;
      }

      if (button.dataset.action === "remove-set") {
        const exercise = entry.exerciseLogs[toNumber(button.dataset.exerciseIndex)];
        if (exercise && exercise.sets.length > 1) {
          exercise.sets.splice(toNumber(button.dataset.setIndex), 1);
          saveState();
          render();
        }
        return;
      }

      if (button.dataset.action === "reset-plan") {
        const plan = getPlan(state.selectedDate);
        entry.actualBodyParts = getDefaultBodyPartsForPlan(plan.name);
        syncActualBodyPartLabel(entry);
        entry.exerciseLogs = plan.exercises.map(createExerciseLog);
        saveState();
        render();
        return;
      }

      if (button.dataset.action === "save-entry") {
        saveState();
        render();
      }
    }

    document.addEventListener("change", handleChange);
    document.addEventListener("click", handleClick);

    render();
    restoreRemoteSession({ silent: true }).then(() => render());
  </script>
</body>
</html>
